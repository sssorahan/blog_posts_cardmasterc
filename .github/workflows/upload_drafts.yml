name: 새 포스트 초안 업로드

on:
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install google-auth-oauthlib google-api-python-client

      - name: Blogger 토큰 복원
        run: echo '${{ secrets.BLOGGER_TOKEN }}' > blogger_token.json

      - name: 새 초안 업로드
        run: python blogger_uploader.py

      - name: pending_drafts.json 동기화
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path
          from datetime import datetime

          uploaded_path = Path('uploaded_posts.json')
          pending_path = Path('pending_drafts.json')

          uploaded = json.loads(uploaded_path.read_text(encoding='utf-8'))
          pending = json.loads(pending_path.read_text(encoding='utf-8')) if pending_path.exists() else {}

          added = 0
          for filename, info in uploaded.items():
              # publish_time이 없는(None) 초안이고 pending에 없는 경우만 추가
              if filename not in pending and not info.get('publish_time'):
                  pending[filename] = {
                      'post_id': info['post_id'],
                      'title': info['title'],
                      'created_at': info.get('uploaded_at', datetime.now().isoformat())
                  }
                  added += 1

          pending_path.write_text(
              json.dumps(pending, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          print(f"pending_drafts.json에 {added}개 추가됨. 총 {len(pending)}개 대기 중.")
          EOF

      - name: 변경 파일 커밋 & 푸시
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add uploaded_posts.json pending_drafts.json
          git diff --staged --quiet || git commit -m "upload-drafts: $(date '+%Y-%m-%d') 신규 20개 초안"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/sssorahan/blog_posts_cardmasterc.git main
