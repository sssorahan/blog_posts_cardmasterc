name: Blogger 초안 동기화

on:
  workflow_dispatch:  # 수동 실행

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install google-auth-oauthlib google-api-python-client

      - name: Blogger 토큰 복원
        run: echo '${{ secrets.BLOGGER_TOKEN }}' > blogger_token.json

      - name: 초안 동기화
        run: python sync_drafts.py

      - name: 변경 파일 커밋 & 푸시
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add uploaded_posts.json pending_drafts.json
          git diff --staged --quiet || git commit -m "sync-drafts: $(date '+%Y-%m-%d') pending 동기화"
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/sssorahan/blog_posts_cardmasterc.git main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/sssorahan/blog_posts_cardmasterc.git main
